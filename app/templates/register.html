{% extends "base.html" %}

{% block title %}用户注册{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>用户注册</h2>
    <form id="registerForm" class="auth-form">
        <div class="form-item">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名">
            <div class="error-text" id="usernameError"></div>
        </div>

        <div class="form-item">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
            <div class="error-text" id="emailError"></div>
        </div>

        <div class="form-item">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码">
            <div class="error-text" id="passwordError"></div>
        </div>

        <div class="form-item">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
            <div class="error-text" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="primary-btn">注册</button>

        <div class="result-text" id="resultMessage"></div>
    </form>

    <div class="bottom-link">
        已有账号？<a href="/login">去登录</a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
