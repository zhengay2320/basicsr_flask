{% extends "auth_base.html" %}


{% block title %}用户注册{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-card-top">
    <div class="auth-card-badge">CREATE ACCOUNT</div>
    <h2>用户注册</h2>
    <p>创建你的专属控制台账号</p>
  </div>

  <form id="registerForm" class="auth-form">
    <div class="form-item">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" placeholder="至少 3 个字符" />
      <div class="error-text" id="usernameError"></div>
    </div>

    <div class="form-item">
      <label for="email">邮箱</label>
      <input id="email" name="email" type="email" placeholder="请输入邮箱（可选）" />
      <div class="error-text" id="emailError"></div>
    </div>

    <div class="form-item">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" placeholder="至少 6 位密码" />
      <div class="error-text" id="passwordError"></div>
    </div>

    <div class="form-item">
      <label for="confirmPassword">确认密码</label>
      <input id="confirmPassword" name="confirmPassword" type="password" placeholder="请再次输入密码" />
      <div class="error-text" id="confirmPasswordError"></div>
    </div>

    <button type="submit" class="submit-btn">注 册</button>
    <div id="resultMessage" class="result-text"></div>
  </form>

  <div class="switch-link">
    已有账号？<a href="/login">去登录</a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
