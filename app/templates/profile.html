{% extends "base.html" %}

{% block title %}个人中心{% endblock %}
{% block page_title %}个人中心{% endblock %}
{% block page_subtitle %}查看你的账号信息与当前主题设置{% endblock %}

{% block content %}
<div class="profile-layout">
  <div class="content-card profile-card">
    <div class="section-title">当前用户信息</div>

    <div class="profile-info-grid">
      <div class="info-item">
        <span class="info-label">ID</span>
        <strong id="userId">-</strong>
      </div>

      <div class="info-item">
        <span class="info-label">用户名</span>
        <strong id="username">-</strong>
      </div>

      <div class="info-item">
        <span class="info-label">邮箱</span>
        <strong id="email">-</strong>
      </div>

      <div class="info-item">
        <span class="info-label">角色</span>
        <strong id="role">-</strong>
      </div>

      <div class="info-item">
        <span class="info-label">主题</span>
        <strong id="theme">-</strong>
      </div>

      <div class="info-item">
        <span class="info-label">状态</span>
        <strong id="status">-</strong>
      </div>
    </div>

    <div id="resultMessage" class="result-text profile-result"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
