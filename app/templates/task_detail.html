<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>任务详情</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/task.css') }}">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>任务详情</h1>
            <button onclick="window.location.href='/dashboard'">返回主页</button>
        </div>

        <div class="form-box">
            <h2>任务信息</h2>
            <div id="taskInfo"></div>

            <div class="form-row action-row">
                <button id="viewConfigBtn">查看/编辑配置</button>
                <button id="exportTaskBtn">导出结果表格</button>
                <button id="deleteTaskBtn" class="danger-btn">删除任务</button>
            </div>

            <h2>启动新运行</h2>
            <div class="form-row">
                <label for="runName">运行名称</label>
                <input id="runName" type="text" placeholder="可选">
            </div>

            <div class="form-row">
                <label for="gpuMode">GPU 模式</label>
                <select id="gpuMode">
                    <option value="single">single</option>
                    <option value="multi">multi</option>
                    <option value="cpu">cpu</option>
                </select>
            </div>

            <div class="form-row">
                <label for="gpuDevices">GPU 设备</label>
                <input id="gpuDevices" type="text" placeholder="例如 0 或 0,1">
            </div>

            <div class="form-row">
                <button id="startRunBtn">启动任务</button>
            </div>

            <div id="runMsg" class="msg-box"></div>

            <h2>执行序列</h2>
            <div id="runList"></div>
        </div>
    </div>

    <!-- 删除任务弹窗 -->
    <div id="deleteTaskModal" class="modal-mask" style="display:none;">
        <div class="modal-card">
            <h3>确认删除任务</h3>
            <p>删除后该任务不会再显示在主页列表中。请输入当前登录密码确认删除。</p>

            <div class="form-row">
                <label for="deletePassword">登录密码</label>
                <input id="deletePassword" type="password" placeholder="请输入当前登录密码">
            </div>

            <div id="deleteTaskMsg" class="msg-box"></div>

            <div class="modal-actions">
                <button id="confirmDeleteTaskBtn" class="danger-btn">确认删除</button>
                <button id="cancelDeleteTaskBtn" type="button">取消</button>
            </div>
        </div>
    </div>

    <script>
        window.__TASK_ID__ = {{ task_id }};
    </script>
    <script src="{{ url_for('static', filename='js/task_detail.js') }}"></script>
</body>
</html>
